name: Static Analysis

permissions:
  contents: read
  security-events: write
  issues: write      # Added this so ZAP can create issues for you
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' 

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linting Dependencies
        run: npm install eslint@10.2.0 @eslint/js htmlhint --save-dev
      - name: Run HTMLHint
        run: npx htmlhint "**/*.html"
      - name: Run ESLint
        run: npx eslint "**/*.js"
        
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Semgrep Scan
        run: |
          python3 -m pip install semgrep
          semgrep --config auto .
          
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  dynamic-analysis:
    name: Dynamic Security Scan (ZAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Fix workspace permissions for ZAP
        run: sudo chmod -R 777 ${{ github.workspace }}
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Double check this URL in your browser! 
          # If it opens your site, keep it. If not, fix it here.
          target: 'https://Robert12905.github.io/Personal-Website---myHTML/'
          fail_action: false

name: Fuzzing

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Simple fuzz simulation
        run: |
          echo "Running fuzz tests..."
          for i in {1..1000}; do
            echo $RANDOM | base64 > /dev/null
          done
          echo "Fuzzing complete"
